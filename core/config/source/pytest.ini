# -*- coding: utf-8 -*-
# config.py モジュールテスト用 pytest 設定ファイル

[pytest]
# テストファイルのパターン
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# デフォルトのテストパス
testpaths = .

# 詳細な出力
addopts = -v --tb=short

# マーカー定義
markers =
    normal: 正常系テスト
    error: 異常系テスト（予期されるエラーハンドリング）
    security: セキュリティ関連テスト
