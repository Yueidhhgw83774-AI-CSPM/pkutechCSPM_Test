[pytest]
# ============================================================
# checkpointer モジュール専用 pytest 設定
# ============================================================

# 最小限の設定（必要に応じてカスタマイズ）
minversion = 7.0

# カスタムマーカー（セキュリティテスト用）
markers =
    security: セキュリティテストのマーカー

# ログレベル（モジュール固有の設定）
log_cli_level = INFO

# 非同期テストサポート
asyncio_mode = auto
