[pytest]
# ============================================================
# AI-CSPM テストプロジェクト pytest 設定
# プロジェクトルート: C:\pythonProject\python_ai_cspm\TestReport
# ============================================================

# pytest-asyncio の非同期モード設定
asyncio_mode = auto

# テストパス（ルートからの相対パス）
testpaths =
    core
    models
    plugins

# テストファイルの検出パターン
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# ログ設定
log_cli = true
log_cli_level = WARNING
log_level = WARNING

