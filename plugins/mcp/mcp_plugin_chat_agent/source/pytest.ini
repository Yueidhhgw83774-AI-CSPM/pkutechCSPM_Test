[pytest]
# pytest-asyncio 配置
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 测试发现配置
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    asyncio: 异步测试标记
    security: 安全测试标记
    xfail: 预期失败的测试

# 输出配置
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

