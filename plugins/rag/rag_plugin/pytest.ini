[pytest]
# Pytest configuration for RAG Plugin tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    asyncio: mark test as async test
    integration: mark test as integration test (requires external services)
    slow: mark test as slow running test

testpaths = source

[coverage:run]
source = app.rag, app.core.rag_manager
omit =
    */tests/*
    */test_*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = reports/coverage_html

