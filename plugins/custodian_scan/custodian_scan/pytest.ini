[pytest]
# Pytest configuration for Custodian Scan tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test execution
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    asyncio: mark test as async test
    integration: mark test as integration test (requires external services)
    security: mark test as security test
    slow: mark test as slow running test

# Test paths
testpaths = source

# Coverage (optional)
[coverage:run]
source = app.custodian_scan, app.jobs.tasks.custodian_scan, app.jobs.tasks.new_custodian_scan
omit =
    */tests/*
    */test_*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = reports/coverage_html

